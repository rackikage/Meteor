app:
  name: Meteor
  version: "0.1.0"
  local_first: true
  debug: false

models:
  # Meteor is an MCP kit — the product is the tool core, driven by external
  # agents (Cursor, Claude Code, OpenCode) over meteor-mcp. The chat sidekick
  # is optional and uses hosted APIs only: keyless Pollinations by default,
  # auto-upgraded to Groq/Cerebras/Gemini/Together/OpenRouter when their API
  # key is present. No local inference (Ollama, llama.cpp) in this build —
  # the tools are what matter, not the brain.
  default_profile: pollinations-free
  profiles:
    # ── Keyless free hosted (Pollinations) ────────────────────────────
    pollinations-free:
      backend: pollinations
      model_path: "openai-fast"       # gpt-4o-mini class, no key required
      context_window: 32768
      temperature: 0.6
      temperature_structured: 0.2
      temperature_creative: 0.85
      max_tokens: 2048
      wired: true
      base_url: "https://text.pollinations.ai/openai"
      role: fast
    pollinations-smart:
      backend: pollinations
      model_path: "openai-large"      # larger free tier model
      context_window: 65536
      temperature: 0.5
      temperature_structured: 0.2
      temperature_creative: 0.85
      max_tokens: 4096
      wired: true
      base_url: "https://text.pollinations.ai/openai"
      role: heavy
    groq-instant:
      backend: groq
      model_path: "llama-3.1-8b-instant"
      context_window: 131072
      temperature: 0.7
      temperature_structured: 0.2
      temperature_creative: 0.8
      max_tokens: 2048
      wired: true
      base_url: "https://api.groq.com/openai/v1"
      role: fast
    groq-versatile:
      backend: groq
      model_path: "llama-3.3-70b-versatile"
      context_window: 131072
      temperature: 0.7
      temperature_structured: 0.2
      temperature_creative: 0.8
      max_tokens: 4096
      wired: true
      base_url: "https://api.groq.com/openai/v1"
      role: heavy
    cerebras-fast:
      backend: cerebras
      model_path: "llama-3.3-70b"
      context_window: 65536
      temperature: 0.7
      temperature_structured: 0.2
      temperature_creative: 0.8
      max_tokens: 4096
      wired: true
      base_url: "https://api.cerebras.ai/v1"
      role: fast
    gemini-flash:
      backend: gemini_openai
      model_path: "gemini-2.0-flash-exp"
      context_window: 1048576
      temperature: 0.7
      temperature_structured: 0.2
      temperature_creative: 0.9
      max_tokens: 4096
      wired: true
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
      role: heavy
    # Local inference profiles (Ollama, llama.cpp) are intentionally omitted.
    # Meteor's value is the tool bridge, not shipping a bundled brain — external
    # agents already have their own model. Re-add here if you want to drive the
    # optional in-app chat with a local model; nothing else in Meteor needs it.

policy:
  default_action: deny

memory:
  backend: sqlite
  path: "./data/memory.db"

retrieval:
  backend: none
  index_path: "./data/index"

storage:
  backend: sqlite
  paths:
    memory: "./data/memory.db"
    audit: "./data/audit.db"
    index_meta: "./data/index_meta.db"

observability:
  log_level: INFO
  audit_enabled: true
  health_checks_enabled: true
